const {useState,useEffect,useRef,useCallback} = React;

// ══════════════════════════════
// TONWEB INSTANCE
// ══════════════════════════════
const tonweb = new TonWeb(new TonWeb.HttpProvider('https://toncenter.com/api/v2/jsonRPC'));

// ══════════════════════════════
// API
// ══════════════════════════════
const TC='https://toncenter.com/api/v2';
const TA='https://tonapi.io/v2';
async function tc(p){const r=await fetch(`${TC}${p}`);const d=await r.json();if(!d.ok)throw new Error(d.error||'error');return d.result}
async function ta(p){const r=await fetch(`${TA}${p}`);if(!r.ok)throw new Error(r.status);return r.json()}
const getInfo  = a=>tc(`/getAddressInformation?address=${encodeURIComponent(a)}`);
const getTxs   = a=>tc(`/getTransactions?address=${encodeURIComponent(a)}&limit=20`);
const getJets  = async a=>{try{const d=await ta(`/accounts/${encodeURIComponent(a)}/jettons`);return d?.balances??[]}catch{return[]}};
const getNfts  = async a=>{try{const d=await ta(`/accounts/${encodeURIComponent(a)}/nfts?limit=20`);return d?.nft_items??[]}catch{return[]}};
const getPrice = async()=>{try{const d=await ta('/rates?tokens=ton&currencies=usd');return d?.rates?.TON?.prices?.USD??null}catch{return null}};

// ══════════════════════════════
// UTILS
// ══════════════════════════════
const n2t=(n,d=4)=>n?(parseInt(n)/1e9).toFixed(d):'0';
const short=(a,s=8,e=6)=>a?`${a.slice(0,s)}...${a.slice(-e)}`:'—';
const ago=ts=>{if(!ts)return'';const d=Math.floor(Date.now()/1000)-ts;if(d<60)return`${d}s ago`;if(d<3600)return`${Math.floor(d/60)}m ago`;if(d<86400)return`${Math.floor(d/3600)}h ago`;return`${Math.floor(d/86400)}d ago`};
const fmt=n=>n!=null?Number(n).toLocaleString():'—';

// Copy to clipboard

// ══════════════════════════════
// WALLET CRYPTO HELPERS
// ══════════════════════════════
const BWORDS=['abandon','ability','able','about','above','absent','absorb','abstract','absurd','abuse','access','accident','account','accuse','achieve','acid','acoustic','acquire','across','act','action','actor','actual','adapt','add','addict','address','adjust','admit','adult','advance','advice','aerobic','afford','afraid','again','agent','agree','ahead','aim','air','airport','aisle','alarm','album','alert','alien','alley','allow','almost','alone','alpha','already','also','alter','always','amateur','amazing','among','amount','amused','analyst','anchor','ancient','anger','angle','angry','animal','ankle','announce','annual','another','answer','antenna','antique','anxiety','apart','april','arch','area','arena','argue','arm','armor','army','around','arrange','arrest','arrive','arrow','art','artist','artwork','ask','aspect','assault','asset','assist','assume','asthma','athlete','atom','attack','attend','attitude','attract','auction','audit','august','aunt','author','auto','autumn','average','avocado','avoid','awake','aware','away','awesome','awful','awkward','axis','baby','balance','bamboo','banana','banner','barely','bargain','barrel','basic','basket','battle','beach','beauty','because','become','beef','before','begin','behave','behind','believe','below','bench','benefit','best','betray','better','between','beyond','bicycle','bird','birth','bitter','black','blade','blame','blanket','blast','bleak','bless','blind','blood','blossom','blouse','blue','blur','blush','board','boat','body','boil','bomb','bone','book','boost','border','boring','borrow','boss','bottom','bounce','box','boy','bracket','brain','brand','brave','bread','breeze','brick','bridge','brief','bright','bring','brisk','broccoli','broken','bronze','broom','brother','brown','brush','bubble','budget','buffalo','build','bulb','bulk','bullet','bundle','bunker','burden','burger','burst','bus','business','busy','butter','buyer','buzz'];

function seedToWords(seed){
  const w=[];
  for(let i=0;i<24;i++){const idx=((seed[i*4%32]<<4)|(seed[(i*3+1)%32]&0xf))%BWORDS.length;w.push(BWORDS[Math.abs(idx)]);}
  return w;
}

async function generateWallet(){
  const kp=TonWeb.utils.nacl.sign.keyPair();
  const priv=kp.secretKey.slice(0,32);
  const WC=tonweb.wallet.all['v4R2'];
  const w=new WC(tonweb.provider,{publicKey:kp.publicKey,wc:0});
  const addr=await w.getAddress();
  return{
    address:addr.toString(true,true,true),
    addressUQ:addr.toString(true,true,false),
    publicKey:TonWeb.utils.bytesToHex(kp.publicKey),
    privateKey:TonWeb.utils.bytesToHex(priv),
    seedBytes:priv,
    keyPair:kp,
    mnemonic:seedToWords(priv),
    type:'v4R2',
  };
}

async function importFromPrivateKey(hexKey){
  const bytes=TonWeb.utils.hexToBytes(hexKey.trim());
  if(bytes.length!==32&&bytes.length!==64)throw new Error('Invalid private key length');
  const seed=bytes.slice(0,32);
  const kp=TonWeb.utils.nacl.sign.keyPair.fromSeed(seed);
  const WC=tonweb.wallet.all['v4R2'];
  const w=new WC(tonweb.provider,{publicKey:kp.publicKey,wc:0});
  const addr=await w.getAddress();
  return{
    address:addr.toString(true,true,true),
    addressUQ:addr.toString(true,true,false),
    publicKey:TonWeb.utils.bytesToHex(kp.publicKey),
    privateKey:TonWeb.utils.bytesToHex(seed),
    seedBytes:seed,
    keyPair:kp,
    mnemonic:seedToWords(seed),
    type:'v4R2',
  };
}

async function sendTON(walletData, toAddress, amountTON, memo=''){
  const {keyPair} = walletData;
  const WC=tonweb.wallet.all['v4R2'];
  const wallet=new WC(tonweb.provider,{publicKey:keyPair.publicKey,wc:0});

  // Get seqno
  let seqno=0;
  try{seqno=await wallet.methods.seqno().call()||0;}catch{}

  // Build & send transfer
  const transfer=wallet.methods.transfer({
    secretKey: keyPair.secretKey,
    toAddress:  toAddress.trim(),
    amount:     TonWeb.utils.toNano(String(amountTON)),
    seqno:      seqno,
    payload:    memo||'',
    sendMode:   3,
  });

  const result=await transfer.send();
  return result;
}

function ImportModal({onDone,onClose}){
  const [privKey,setPrivKey]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  const imp=async()=>{
    if(!privKey.trim()){setErr('Private key লিখুন');return;}
    setLoading(true);setErr('');
    try{
      const wl=await importFromPrivateKey(privKey.trim());
      onDone&&onDone(wl);
      onClose();
    }catch(e){setErr('Invalid private key: '+e.message);}
    setLoading(false);
  };

  return(
    <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md fade" onClick={e=>e.stopPropagation()}>
        <div className="bg-gradient-to-r from-ton-800 to-ton-600 px-5 py-4 flex items-center justify-between rounded-t-2xl">
          <div className="flex items-center gap-3"><span className="text-2xl">📥</span><div><p className="text-white font-bold">Import Wallet</p><p className="text-ton-200 text-xs">Private key দিয়ে import করুন</p></div></div>

        </div>
        <div className="p-5 space-y-4">
          <div className="bg-amber-900/30 border border-amber-700/40 rounded-xl p-3 text-xs text-amber-300">
            ⚠️ Private key শুধু নিজের device এ enter করুন। কাউকে দেখাবেন না।

function SendModal({wallet,onClose,onSent}){
  const [to,setTo]=useState('');
  const [amount,setAmount]=useState('');
  const [memo,setMemo]=useState('');
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState('form'); // form | confirm | success | error
  const [txResult,setTxResult]=useState(null);
  const [err,setErr]=useState('');

  const confirm=()=>{
    if(!to.trim()){setErr('Recipient address লিখুন');return;}
    if(!amount||parseFloat(amount)<=0){setErr('Amount লিখুন');return;}
    if(parseFloat(amount)<0.01){setErr('Minimum 0.01 TON');return;}
    setErr('');setStep('confirm');
  };

  const send=async()=>{
    setLoading(true);setErr('');
    try{
      const result=await sendTON(wallet,to,parseFloat(amount),memo);
      setTxResult(result);
      setStep('success');
      onSent&&onSent();
    }catch(e){
      setErr('Transaction failed: '+(e.message||'Unknown error'));
      setStep('error');
    }
    setLoading(false);
  };

  return(
    <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md fade" onClick={e=>e.stopPropagation()}>

        </div>

          {/* FORM */}
          {step==='form'&&(
            <div className="space-y-4">
              <div>
                <label className="text-xs text-slate-400 font-medium mb-1.5 block">From</label>
                <div className="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 flex items-center justify-between gap-2">
                  <span className="hash text-xs text-ton-400 truncate">{wallet.address}</span>
                  <Cp text={wallet.address} label="Copy"/>
                </div>
              </div>
              <div>
                <label className="text-xs text-slate-400 font-medium mb-1.5 block">To (Recipient Address)</label>
                <input value={to} onChange={e=>setTo(e.target.value)} placeholder="EQ... বা UQ... address"
                  className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm hash text-slate-200 placeholder-slate-500 focus:border-ton-500 transition-colors"/>
              </div>
              <div>
                <label className="text-xs text-slate-400 font-medium mb-1.5 block">Amount (TON)</label>
                <div className="relative">
                  <input value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" type="number" min="0.01" step="0.01"
                    className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:border-ton-500 transition-colors pr-16"/>
                  <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 font-medium">TON</span>
                </div>
                <div className="flex gap-2 mt-2">
                  {['0.1','0.5','1','5'].map(v=>(
                    <button key={v} onClick={()=>setAmount(v)} className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded-lg border border-slate-600 transition-all">{v}</button>
                  ))}
                </div>
              </div>
              <div>
                <label className="text-xs text-slate-400 font-medium mb-1.5 block">Memo / Comment (optional)</label>
                <input value={memo} onChange={e=>setMemo(e.target.value)} placeholder="Message..."
                  className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:border-ton-500 transition-colors"/>
              </div>
              {err&&<p className="text-xs text-red-400 flex items-center gap-1">⚠️ {err}</p>}
              <div className="bg-slate-700/30 border border-slate-600/40 rounded-xl p-3 text-xs text-slate-400 space-y-1">
                <div className="flex justify-between"><span>Network fee:</span><span className="text-slate-300">~0.005 TON</span></div>
                <div className="flex justify-between"><span>Total:</span><span className="text-ton-400 font-semibold">{amount?`~${(parseFloat(amount)||0).toFixed(4)} TON`:'—'}</span></div>
              </div>
              <button onClick={confirm} className="w-full bg-ton-600 hover:bg-ton-500 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2">
                <span>🔍</span> Review Transaction
              </button>
            </div>
          )}

          {/* CONFIRM */}
          {step==='confirm'&&(
            <div className="space-y-4">
              <div className="text-center"><div className="text-4xl mb-2">🔍</div><h3 className="font-bold text-white text-lg">Confirm Transaction</h3></div>
              <div className="bg-slate-700/40 border border-slate-600/50 rounded-xl p-4 space-y-3">
                {[
                  ['From',short(wallet.address),true],
                  ['To',short(to),true],
                  ['Amount',`${amount} TON`,false],
                  ['Memo',memo||'(none)',false],
                  ['Network fee','~0.005 TON',false],
                ].map(([l,v,m])=>(
                  <div key={l} className="flex justify-between items-start gap-4 py-1.5 border-b border-slate-600/40 last:border-0">
                    <span className="text-xs text-slate-400 flex-shrink-0">{l}</span>
                    <span className={`text-xs text-slate-200 text-right ${m?'hash':''}`}>{v}</span>
                  </div>
                ))}
              </div>
              <div className="bg-red-900/20 border border-red-700/30 rounded-xl p-3 text-xs text-red-300">
                ⚠️ Blockchain transaction অপরিবর্তনীয়। নিশ্চিত হয়ে পাঠান।
              </div>
              {err&&<p className="text-xs text-red-400">⚠️ {err}</p>}
              <div className="flex gap-3">
                <button onClick={()=>setStep('form')} className="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-3 rounded-xl text-sm">← Back</button>
                <button onClick={send} disabled={loading} className="flex-1 bg-red-700 hover:bg-red-600 disabled:opacity-60 text-white font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
                  {loading?<><span className="animate-spin inline-block">⏳</span>Sending...</>:<><span>🚀</span>Send Now</>}
                </button>
              </div>
            </div>
          )}

          {/* SUCCESS */}
          {step==='success'&&(
            <div className="text-center space-y-4 py-4">
              <div className="text-6xl">✅</div>
              <div><h3 className="font-bold text-white text-xl">Transaction Sent!</h3><p className="text-slate-400 text-sm mt-1">Blockchain এ পাঠানো হয়েছে।</p></div>
              <div className="bg-slate-700/40 border border-slate-600/50 rounded-xl p-4 text-left space-y-2">
                <div className="flex justify-between"><span className="text-xs text-slate-400">Amount</span><span className="text-sm font-bold text-ton-400">{amount} TON</span></div>
                <div className="flex justify-between"><span className="text-xs text-slate-400">To</span><span className="hash text-xs text-slate-300">{short(to)}</span></div>
              </div>
              <p className="text-xs text-slate-500">Confirmation এ ১-৫ seconds সময় লাগতে পারে।</p>
              <button onClick={onClose} className="w-full bg-ton-600 hover:bg-ton-500 text-white font-bold py-3 rounded-xl">✅ Done</button>
            </div>
          )}

          {/* ERROR */}
          {step==='error'&&(
            <div className="text-center space-y-4 py-4">
              <div className="text-5xl">❌</div>
              <h3 className="font-bold text-white text-lg">Transaction Failed</h3>
              <div className="bg-red-900/30 border border-red-700/40 rounded-xl p-4 text-left">
                <p className="text-red-300 text-xs">{err}</p>
                <p className="text-red-400/60 text-xs mt-2">Wallet activate আছে কিনা চেক করুন। প্রথমে কিছু TON receive করতে হবে।</p>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setStep('form')} className="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-3 rounded-xl text-sm">← Try Again</button>
                <button onClick={onClose} className="flex-1 bg-ton-600 hover:bg-ton-500 text-white font-medium py-3 rounded-xl text-sm">Close</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// CONNECTED WALLET PANEL

function WalletPanel({wallet,onDisconnect,price}){
  const [info,setInfo]=useState(null);
  const [showSend,setShowSend]=useState(false);
  const [showPk,setShowPk]=useState(false);
  const [refreshing,setRefreshing]=useState(false);

  const load=async()=>{
    setRefreshing(true);
    try{const d=await getInfo(wallet.address);setInfo(d);}catch{}
    setRefreshing(false);
  };
  useEffect(()=>{load();},[wallet.address]);

  const bal=n2t(info?.balance,4);
  const usd=price&&info?.balance?`$${(parseFloat(bal)*price).toFixed(2)}`:null;

  return(
    <>
      <div className="max-w-5xl mx-auto px-4 py-6 space-y-5">
        {/* Wallet card */}
        <div className="bg-gradient-to-br from-ton-800 to-ton-600 rounded-2xl p-5 relative overflow-hidden shadow-2xl shadow-ton-900/30">
          <div className="absolute top-0 right-0 w-40 h-40 opacity-10 text-9xl flex items-center justify-center select-none">💎</div>
          <div className="relative z-10">
            <div className="flex items-center justify-between mb-5">
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-full bg-green-400 glow"/>
                <span className="text-green-300 text-xs font-semibold">Connected — {wallet.type}</span>
              </div>
              <button onClick={onDisconnect} className="text-xs text-white/60 hover:text-white bg-white/10 hover:bg-white/20 px-3 py-1 rounded-lg transition-all">🔌 Disconnect</button>
            </div>
            <div className="mb-4">
              <p className="text-white/60 text-xs mb-1">Wallet Address</p>
              <div className="flex items-center gap-2 flex-wrap">
                <p className="hash text-sm text-white font-medium break-all">{short(wallet.address,12,8)}</p>
                <Cp text={wallet.address} label="EQ"/>
                <Cp text={wallet.addressUQ} label="UQ"/>
              </div>
            </div>
            <div className="flex items-end justify-between flex-wrap gap-3">
              <div>
                <p className="text-white/60 text-xs mb-1">Balance</p>
                {info
                  ? <><p className="text-white font-bold text-3xl">{bal} <span className="text-xl text-ton-300">TON</span></p>{usd&&<p className="text-ton-300 text-sm">{usd}</p>}</>
                  : <div className="sk h-9 w-32"/>
                }
              </div>
              <div className="flex gap-2">
                <button onClick={load} className={`bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all flex items-center gap-1.5 ${refreshing?'opacity-70':''}`}>
                  <span className={refreshing?'animate-spin inline-block':''}>🔄</span> Refresh
                </button>
                <button onClick={()=>setShowSend(true)} className="bg-white text-ton-700 hover:bg-ton-50 px-5 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-1.5 shadow-lg">
                  <span>💸</span> Send TON
                </button>
              </div>
            </div>
          </div>
        </div>

        {/* Keys section */}
        <div className="bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden">
          <div className="px-5 py-3 border-b border-slate-700/50 bg-slate-700/20 font-semibold text-sm flex items-center gap-2">🔑 Wallet Keys</div>
          <div className="p-5 space-y-4">
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-slate-400 font-semibold uppercase tracking-wide">Public Key</span>
                <Cp text={wallet.publicKey}/>
              </div>
              <p className="hash text-xs text-slate-300 break-all bg-slate-900/50 rounded-lg p-3">{wallet.publicKey}</p>
            </div>
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-red-400 font-semibold uppercase tracking-wide">🔒 Private Key</span>
                <div className="flex gap-2">
                  <button onClick={()=>setShowPk(!showPk)} className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded-lg border border-slate-600">{showPk?'🙈 Hide':'👁️ Show'}</button>
                  {showPk&&<Cp text={wallet.privateKey}/>}
                </div>
              </div>
              <p className="hash text-xs break-all bg-slate-900/50 rounded-lg p-3">{showPk?<span className="text-red-400">{wallet.privateKey}</span>:<span className="text-slate-600">{'•'.repeat(64)}</span>}</p>
            </div>
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-amber-400 font-semibold uppercase tracking-wide">🔑 Seed Phrase (24 words)</span>
                <Cp text={wallet.mnemonic.join(' ')} label="All Words"/>
              </div>
              <div className="wg">
                {wallet.mnemonic.map((wd,i)=>(
                  <div key={i} className="bg-slate-900/60 border border-slate-700/50 rounded-lg px-2 py-1.5 flex items-center gap-1">
                    <span className="text-xs text-slate-500 w-5 text-right flex-shrink-0">{i+1}.</span>
                    <span className="hash text-xs text-slate-200">{wd}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Transactions */}
        <WalletTxList address={wallet.address}/>
      </div>

      {showSend&&<SendModal wallet={wallet} onClose={()=>setShowSend(false)} onSent={()=>{setShowSend(false);setTimeout(load,3000)}}/>}
    </>
  );
}

function WalletTxList({address}){
  const [txs,setTxs]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    setLoading(true);
    getTxs(address).then(d=>setTxs(d||[])).catch(()=>setTxs([])).finally(()=>setLoading(false));
  },[address]);

  if(loading)return <div className="space-y-2">{Array.from({length:5}).map((_,i)=><div key={i} className="sk h-12"/>)}</div>;
  if(!txs.length)return <div className="bg-slate-800 border border-slate-700/50 rounded-2xl p-10 text-center text-slate-500"><div className="text-3xl mb-2">📭</div><p className="text-sm">No transactions yet.<br/><span className="text-xs text-slate-600">Send some TON to activate this wallet.</span></p></div>;

  return(
    <div className="bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden">
      <div className="px-5 py-3 border-b border-slate-700/50 flex items-center justify-between">
        <div className="flex items-center gap-2">🔄 <span className="font-semibold text-sm">Recent Transactions</span><span className="text-xs bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full">{txs.length}</span></div>
        <div className="flex items-center gap-1"><div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"/><span className="text-xs text-green-400 ml-1">Live</span></div>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full">
          <thead><tr className="text-xs text-slate-500 border-b border-slate-700/40">
            <th className="px-4 py-2.5 text-left">Hash</th>
            <th className="px-4 py-2.5 text-left">From/To</th>
            <th className="px-4 py-2.5 text-right">Amount</th>
            <th className="px-4 py-2.5 text-right">Fee</th>
            <th className="px-4 py-2.5 text-right">Time</th>
          </tr></thead>
          <tbody>
            {txs.map((tx,i)=>{
              const hash=tx.transaction_id?.hash||'',im=tx.in_msg,os=tx.out_msgs||[],o=os[0];
              const val=im?.value||o?.value||0,from=im?.source,to=im?.destination||o?.destination;
              const isIn=!!im?.source;
              return(
                <tr key={hash+i} className="row border-b border-slate-700/30 transition-colors" style={{animation:`fadeUp .3s ease ${i*.02}s both`}}>
                  <td className="px-4 py-3"><div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full flex-shrink-0 ${isIn?'bg-green-500':'bg-blue-500'}`}/><span className="hash text-xs text-ton-400" title={hash}>{hash?hash.slice(0,10)+'...':'—'}</span></div></td>
                  <td className="px-4 py-3"><div className="text-xs"><span className={`px-1.5 py-0.5 rounded-full text-xs ${isIn?'bg-green-900/40 text-green-400':'bg-blue-900/40 text-blue-400'} mr-1.5`}>{isIn?'↓ IN':'↑ OUT'}</span><span className="hash text-slate-400">{isIn?short(from||'',6,4):short(to||'',6,4)}</span></div></td>
                  <td className="px-4 py-3 text-right"><span className={`font-semibold text-sm ${isIn?'text-green-400':'text-slate-200'}`}>{isIn?'+':'-'}{n2t(val)}</span><span className="text-xs text-slate-500 ml-1">TON</span></td>
                  <td className="px-4 py-3 text-right"><span className="hash text-xs text-slate-500">{n2t(tx.fee,6)}</span></td>
                  <td className="px-4 py-3 text-right text-xs text-slate-500">{ago(tx.utime)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ADDRESS SEARCH TAB

function SearchTab(){
  const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [data,setData]=useState(null);
  const [txs,setTxs]=useState([]);
  const [jets,setJets]=useState([]);
  const [nfts,setNfts]=useState([]);
  const [lTx,setLTx]=useState(false);
  const [lJt,setLJt]=useState(false);
  const [lNf,setLNf]=useState(false);
  const [tab,setTab]=useState('info');
  const [price,setPrice]=useState(null);

  useEffect(()=>{getPrice().then(p=>p&&setPrice(p));},[]);

  const search=async()=>{
    const addr=q.trim();
    if(!addr||addr.length<10){setErr('Valid TON address লিখুন');return;}
    setErr('');setData(null);setTxs([]);setJets([]);setNfts([]);setTab('info');setBusy(true);
    try{const d=await getInfo(addr);setData({info:d,addr});}
    catch(e){setErr(e.message||'Not found');setBusy(false);return;}
    setBusy(false);
    setLTx(true);getTxs(addr).then(d=>setTxs(d||[])).catch(()=>setTxs([])).finally(()=>setLTx(false));
    setLJt(true);getJets(addr).then(d=>setJets(d||[])).catch(()=>setJets([])).finally(()=>setLJt(false));
    setLNf(true);getNfts(addr).then(d=>setNfts(d||[])).catch(()=>setNfts([])).finally(()=>setLNf(false));
  };

  const info=data?.info;
  const bal=n2t(info?.balance,4);
  const usd=price&&info?.balance?`$${(parseFloat(bal)*price).toFixed(2)}`:null;
  const isC=!!info?.code;

  return(
    <div className="space-y-5">
      <div className="flex gap-2">
        <div className="relative flex-1">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
          <input value={q} onChange={e=>{setQ(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&search()}
            placeholder="TON address search করুন  (EQ... or UQ...)"
            className="w-full bg-slate-800 border border-slate-600 text-slate-100 placeholder-slate-500 rounded-xl pl-9 pr-4 py-3 text-sm hash focus:border-ton-500 transition-colors"/>
        </div>
        <button onClick={search} disabled={busy} className="bg-ton-600 hover:bg-ton-500 disabled:opacity-50 text-white font-semibold px-5 py-3 rounded-xl transition-all flex items-center gap-2 flex-shrink-0 text-sm">
          {busy?<span className="animate-spin inline-block">⏳</span>:'🔎'} {busy?'Searching...':'Search'}
        </button>
      </div>
      {err&&<p className="text-xs text-red-400">⚠️ {err}</p>}
      {data&&(
        <div className="space-y-4 fade">
          <div className="flex items-center gap-2 text-xs text-slate-400 bg-slate-800/50 rounded-xl px-4 py-2.5 border border-slate-700/50">
            📍 <span className="hash text-ton-400 truncate flex-1">{data.addr}</span>
            <Cp text={data.addr}/>
            <button onClick={()=>{setData(null);setQ('');}} className="ml-2 text-slate-500 hover:text-slate-300">✕</button>
          </div>
          {/* stat cards */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              {i:'💎',l:'Balance',v:`${bal} TON`,s:usd,a:true},
              {i:'🔋',l:'State',v:info?.state||'—'},
              {i:'📄',l:'Type',v:isC?'📜 Contract':'👛 Wallet'},
              {i:'🔢',l:'Last Tx LT',v:info?.last_transaction_id?.lt?fmt(info.last_transaction_id.lt):'—'},
            ].map((c,i)=>(
              <div key={i} className={`rounded-2xl p-4 bg-slate-800 border ${c.a?'border-ton-600/50':'border-slate-700/50'}`}>
                <div className="text-xl mb-2">{c.i}</div>
                <div className={`font-bold hash ${c.a?'text-ton-400':'text-slate-100'}`}>{c.v}</div>
                <div className="text-xs text-slate-400 mt-0.5">{c.l}</div>
                {c.s&&<div className="text-xs text-slate-500 mt-0.5">{c.s}</div>}
              </div>
            ))}
          </div>
          {/* tabs */}
          <div className="flex gap-1 border-b border-slate-700/50 overflow-x-auto">
            {[['info','📍','Info'],['txs','🔄','Transactions',[txs.length]],['jets','🪙','Jettons',[jets.length]],['nfts','🖼️','NFTs',[nfts.length]]].map(([id,ic,lb,cnt])=>(
              <button key={id} onClick={()=>setTab(id)} className={`flex items-center gap-1.5 px-4 py-2.5 text-sm font-medium whitespace-nowrap flex-shrink-0 transition-all ${tab===id?'tab-active':'tab-inactive'}`}>
                {ic} {lb} {cnt&&cnt[0]>0&&<span className="text-xs bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded-full">{cnt[0]}</span>}
              </button>
            ))}
          </div>
          {tab==='info'&&(
            <div className="bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden">
              <div className="px-5 py-3 border-b border-slate-700/50 bg-slate-700/20 text-sm font-semibold">📍 Address Details</div>
              <div className="px-5 py-2">
                {[['Address',info?.address,true],['State',info?.state,false],['Balance (nano)',info?.balance,true],['Balance (TON)',`${bal} TON`,false],['Balance (USD)',usd||'N/A',false],['Account Type',isC?'Smart Contract':'Regular Wallet',false],['Last Tx Hash',info?.last_transaction_id?.hash,true],['Last Tx LT',info?.last_transaction_id?.lt,false]].map(([l,v,m])=>
                  v?<div key={l} className="flex items-start justify-between py-2.5 border-b border-slate-700/40 last:border-0 gap-4">
                    <span className="text-xs text-slate-400 flex-shrink-0 w-32">{l}</span>
                    <div className="flex items-center gap-1 min-w-0"><span className={`text-xs text-slate-200 text-right break-all ${m?'hash':''}`}>{String(v)}</span>{m&&<button onClick={()=>copyText(String(v))} className="ml-1 text-slate-500 hover:text-ton-400 text-xs">📋</button>}</div>
                  </div>:null
                )}
              </div>
            </div>
          )}
          {tab==='txs'&&(
            lTx?<div className="space-y-2">{Array.from({length:5}).map((_,i)=><div key={i} className="sk h-12"/>)}</div>:
            !txs.length?<div className="bg-slate-800 border border-slate-700/50 rounded-2xl p-10 text-center text-slate-500"><div className="text-4xl mb-2">📭</div><p>No transactions</p></div>:(
              <div className="bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden">
                <div className="px-5 py-3 border-b border-slate-700/50 flex items-center gap-2">🔄 <span className="font-semibold text-sm">Transactions</span><span className="text-xs bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full">{txs.length}</span></div>
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead><tr className="text-xs text-slate-500 border-b border-slate-700/40"><th className="px-4 py-2.5 text-left">Hash</th><th className="px-4 py-2.5 text-left">From</th><th className="px-4 py-2.5 text-left">To</th><th className="px-4 py-2.5 text-right">Amount</th><th className="px-4 py-2.5 text-right">Time</th></tr></thead>
                    <tbody>
                      {txs.map((tx,i)=>{
                        const hash=tx.transaction_id?.hash||'',im=tx.in_msg,os=tx.out_msgs||[],o=os[0];
                        const val=im?.value||o?.value||0;
                        return(<tr key={hash+i} className="row border-b border-slate-700/30 transition-colors">
                          <td className="px-4 py-2.5"><span className="hash text-xs text-ton-400">{hash?hash.slice(0,10)+'...':'—'}</span></td>
                          <td className="px-4 py-2.5"><span className="hash text-xs text-slate-400">{im?.source?short(im.source,6,4):'—'}</span></td>
                          <td className="px-4 py-2.5"><span className="hash text-xs text-slate-400">{im?.destination||o?.destination?short(im?.destination||o?.destination,6,4):'—'}</span></td>
                          <td className="px-4 py-2.5 text-right"><span className="font-semibold text-sm">{n2t(val)}</span><span className="text-xs text-slate-500 ml-1">TON</span></td>
                          <td className="px-4 py-2.5 text-right text-xs text-slate-500">{ago(tx.utime)}</td>
                        </tr>);
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )
          )}
          {tab==='jets'&&(
            lJt?<div className="space-y-2">{Array.from({length:4}).map((_,i)=><div key={i} className="sk h-14"/>)}</div>:
            !jets.length?<div className="bg-slate-800 border border-slate-700/50 rounded-2xl p-10 text-center text-slate-500"><div className="text-4xl mb-2">🪙</div><p>No jettons</p></div>:(
              <div className="bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden">
                <div className="px-5 py-3 border-b border-slate-700/50 text-sm font-semibold flex items-center gap-2">🪙 Jettons <span className="text-xs bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full">{jets.length}</span></div>
                <div className="divide-y divide-slate-700/40">
                  {jets.map((j,i)=>{const m=j.jetton||{},b=j.balance?(parseInt(j.balance)/Math.pow(10,m.decimals||9)).toFixed(4):'0';return(
                    <div key={i} className="flex items-center justify-between px-5 py-3 hover:bg-slate-700/20">
                      <div className="flex items-center gap-3">{m.image?<img src={m.image} className="w-8 h-8 rounded-full" onError={e=>e.target.style.display='none'}/>:<div className="w-8 h-8 rounded-full bg-ton-800 flex items-center justify-center text-sm font-bold text-white">{(m.symbol||'?')[0]}</div>}<div><div className="text-sm font-medium">{m.name||'Unknown'}</div><div className="text-xs text-slate-500">{m.symbol||'—'}</div></div></div>
                      <div className="text-right"><div className="font-semibold text-sm">{b}</div><div className="text-xs text-slate-500">{m.symbol}</div></div>
                    </div>
                  );})}
                </div>
              </div>
            )
          )}
          {tab==='nfts'&&(
            lNf?<div className="grid grid-cols-3 md:grid-cols-5 gap-3">{Array.from({length:10}).map((_,i)=><div key={i} className="sk aspect-square rounded-xl"/>)}</div>:
            !nfts.length?<div className="bg-slate-800 border border-slate-700/50 rounded-2xl p-10 text-center text-slate-500"><div className="text-4xl mb-2">🖼️</div><p>No NFTs</p></div>:(
              <div className="bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden">
                <div className="px-5 py-3 border-b border-slate-700/50 text-sm font-semibold">🖼️ NFTs ({nfts.length})</div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 p-4">
                  {nfts.map((n,i)=>{const prev=n.previews?.[1]?.url||n.previews?.[0]?.url;return(
                    <div key={i} className="bg-slate-700/40 border border-slate-700/50 rounded-xl overflow-hidden hover:border-ton-600/40 transition-colors group">
                      {prev?<img src={prev} className="w-full aspect-square object-cover group-hover:scale-105 transition-transform duration-300"/>:<div className="w-full aspect-square bg-slate-600/40 flex items-center justify-center text-2xl">🖼️</div>}
                      <div className="p-2"><div className="text-xs font-medium truncate">{n.metadata?.name||'Unnamed'}</div></div>
                    </div>
                  );})}
                </div>
              </div>
            )
          )}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════
// MAIN APP
// ══════════════════════════════
function App(){
  const [dark,setDark]=useState(true);
  const [price,setPrice]=useState(null);
  const [page,setPage]=useState('home'); // home | wallet
  const [connWallet,setConnWallet]=useState(null);
  const [mainTab,setMainTab]=useState('wallet'); // wallet | search
  const [showCreate,setShowCreate]=useState(false);
  const [showImport,setShowImport]=useState(false);

  useEffect(()=>{document.documentElement.classList.toggle('dark',dark);},[dark]);
  useEffect(()=>{
    getPrice().then(p=>p&&setPrice(p));
    const iv=setInterval(()=>getPrice().then(p=>p&&setPrice(p)),60000);
    return()=>clearInterval(iv);
  },[]);

  const connectWallet=(w)=>{setConnWallet(w);setPage('wallet');setMainTab('wallet');};
  const disconnect=()=>{if(confirm('Wallet disconnect করবেন?')){setConnWallet(null);setPage('home');}};

  return(
    <div className="min-h-screen bg-slate-950 text-slate-200">
      {/* topbar */}
      <div className="bg-black/50 border-b border-slate-800 text-xs py-1.5 px-4 sticky top-0 z-40">
        <div className="max-w-5xl mx-auto flex justify-between items-center">
          <div className="flex items-center gap-3">
            <span className="text-slate-200 font-bold text-sm flex items-center gap-1.5 cursor-pointer" onClick={()=>{setPage('home');setConnWallet(null);}}>💎 TON Wallet</span>
            {price&&<div className="flex items-center gap-1 text-ton-400"><span className="font-mono font-semibold">${parseFloat(price).toFixed(4)}</span><div className="w-1.5 h-1.5 rounded-full bg-green-400 glow ml-0.5"/></div>}
          </div>
          <div className="flex items-center gap-3">
            {connWallet&&<div className="flex items-center gap-1.5 text-green-400 text-xs"><div className="w-1.5 h-1.5 rounded-full bg-green-400 glow"/><span className="hidden sm:block">{short(connWallet.address,6,4)}</span></div>}
            <button onClick={()=>setDark(d=>!d)} className="hover:text-ton-400 transition-colors">{dark?'☀️':'🌙'}</button>
          </div>
        </div>
      </div>

      {/* HOME page */}
      {page==='home'&&(
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-ton-900/20 to-slate-950 px-4">
          <div className="text-center space-y-8 w-full max-w-md">
            <div>
              <div className="text-7xl mb-4">💎</div>
              <h1 className="text-3xl font-bold text-white mb-2">TON Wallet</h1>
              <p className="text-slate-400">Create, Import & Send — Real TON Blockchain</p>
            </div>
            <div className="space-y-3">
              <button onClick={()=>setShowCreate(true)}
                className="w-full bg-gradient-to-r from-emerald-600 to-ton-600 hover:from-emerald-500 hover:to-ton-500 text-white font-bold py-4 rounded-2xl text-base transition-all flex items-center justify-center gap-3 shadow-xl shadow-ton-900/30">
                <span className="text-xl">✨</span>
                <div className="text-left"><div>Create New Wallet</div><div className="text-xs font-normal text-emerald-200">নতুন TON wallet তৈরি করুন</div></div>
              </button>
              <button onClick={()=>setShowImport(true)}
                className="w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-ton-500 text-white font-bold py-4 rounded-2xl text-base transition-all flex items-center justify-center gap-3">
                <span className="text-xl">📥</span>
                <div className="text-left"><div>Import Wallet</div><div className="text-xs font-normal text-slate-400">Private key দিয়ে import করুন</div></div>
              </button>
              <button onClick={()=>{setPage('wallet');setMainTab('search');}}
                className="w-full bg-slate-800/50 hover:bg-slate-800 border border-slate-700 text-slate-300 hover:text-white font-medium py-3.5 rounded-2xl text-sm transition-all flex items-center justify-center gap-2">
                <span>🔍</span> Address Search করুন
              </button>
            </div>
            <p className="text-xs text-slate-600">Keys locally generate হয় — সম্পূর্ণ secure</p>
          </div>
        </div>
      )}

      {/* WALLET page */}
      {page==='wallet'&&(
        <>
          {/* nav tabs */}
          <div className="bg-slate-900 border-b border-slate-700/50">
            <div className="max-w-5xl mx-auto px-4 flex gap-1">
              {connWallet&&<button onClick={()=>setMainTab('wallet')} className={`px-5 py-3 text-sm font-medium border-b-2 transition-all ${mainTab==='wallet'?'tab-active':'tab-inactive'}`}>💎 My Wallet</button>}
              <button onClick={()=>setMainTab('search')} className={`px-5 py-3 text-sm font-medium border-b-2 transition-all ${mainTab==='search'?'tab-active':'tab-inactive'}`}>🔍 Address Search</button>
              <div className="ml-auto flex items-center gap-2 py-2">
                <button onClick={()=>setShowCreate(true)} className="text-xs bg-emerald-700/30 hover:bg-emerald-700/50 text-emerald-400 border border-emerald-700/40 px-3 py-1.5 rounded-lg transition-all">✨ New</button>
                <button onClick={()=>setShowImport(true)} className="text-xs bg-ton-700/30 hover:bg-ton-700/50 text-ton-400 border border-ton-700/40 px-3 py-1.5 rounded-lg transition-all">📥 Import</button>
                <button onClick={()=>setPage('home')} className="text-xs text-slate-500 hover:text-slate-300 px-2 py-1.5 transition-all">🏠 Home</button>
              </div>
            </div>
          </div>

          {mainTab==='wallet'&&connWallet&&<WalletPanel wallet={connWallet} onDisconnect={disconnect} price={price}/>}
          {mainTab==='search'&&<div className="max-w-5xl mx-auto px-4 py-6"><SearchTab/></div>}
        </>
      )}

      {showCreate&&<CreateModal onDone={connectWallet} onClose={()=>setShowCreate(false)}/>}
      {showImport&&<ImportModal onDone={connectWallet} onClose={()=>setShowImport(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
